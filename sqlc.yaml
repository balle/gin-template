version: "2"
sql:
  - engine: "postgresql"
    queries: "query.sql"
    schema: "./migrations"
    gen:
      go:
        package: "repository"
        out: "repository"
        sql_package: "pgx/v5"
        overrides:
          - db_type: "timestamp"
            go_type: "*time.Time"
          - db_type: "timestamptz"
            go_type: "*time.Time"
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "numeric"
            go_type: "github.com/shopspring/decimal.Decimal"
          - db_type: "decimal"
            go_type: "github.com/shopspring/decimal.Decimal"
          - db_type: "date"
            go_type: "time.Time"          
          - db_type: "int4"
            go_type: "int32"
